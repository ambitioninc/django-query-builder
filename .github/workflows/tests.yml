# copied from django-cte
name: querybuilder tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master,develop]

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Track the Django versions with upstream support (currently 5.2 LTS and
        # 6.0) and the python versions each of them supports.
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
        django:
        - 'Django~=5.2.0'
        - 'Django~=6.0.0'
        psycopg:
        - 'psycopg2~=2.9.10'
        - 'psycopg~=3.2.0'
        experimental: [false]
        exclude:
        # Django 6.0 supports python 3.12+
        - python: '3.10'
          django: 'Django~=6.0.0'
        - python: '3.11'
          django: 'Django~=6.0.0'
    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}
    - name: Setup
      run: |
        python --version
        pip install --upgrade pip wheel
        pip install -r requirements/requirements.txt
        pip install -r requirements/requirements-testing.txt
        pip install "${{ matrix.django }}"
        pip install "${{ matrix.psycopg }}"
        pip freeze
    - name: Run tests
      env:
        DB_SETTINGS: >-
          {
            "ENGINE":"django.db.backends.postgresql",
            "NAME":"querybuilder",
            "USER":"postgres",
            "PASSWORD":"postgres",
            "HOST":"localhost",
            "PORT":"5432"
          }
        DB_SETTINGS2: >-
          {
            "ENGINE":"django.db.backends.postgresql",
            "NAME":"querybuilder2",
            "USER":"postgres",
            "PASSWORD":"postgres",
            "HOST":"localhost",
            "PORT":"5432"
          }
      run: |
        coverage run manage.py test querybuilder --pattern="*_tests.py"
        coverage report --fail-under=90
      continue-on-error: ${{ matrix.experimental }}
    - name: Check style
      run: flake8 querybuilder
